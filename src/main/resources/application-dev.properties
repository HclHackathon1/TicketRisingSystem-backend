# Development Environment Configuration with OPTIONAL SSL

# ============================================================================
# Server Configuration (Development)
# ============================================================================
server.port=8080

# Optional SSL/TLS Configuration (uncomment to enable for development)
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# server.ssl.enabled=true

# ============================================================================
# Database Configuration (Development - H2 or local MySQL)
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_rising_system_dev
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA Configuration (Development)
# ============================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT Configuration (Development)
# ============================================================================
jwt.secret=MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm
jwt.expiration=86400000

# ============================================================================
# Swagger/OpenAPI Configuration (Development)
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================================
# Logging Configuration (Development)
# ============================================================================
logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
