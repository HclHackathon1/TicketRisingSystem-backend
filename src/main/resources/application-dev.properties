# Development Environment Configuration with OPTIONAL SSL

# ============================================================================
# Server Configuration (Development)
# ============================================================================
server.port=${SERVER_PORT:8080}

# Optional SSL/TLS Configuration (uncomment to enable for development)
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# server.ssl.enabled=true

# ============================================================================
# Database Configuration (Development - local MySQL)
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Djaadhi_09}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA Configuration (Development)
# ============================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT Configuration (Development)
# ============================================================================
jwt.secret=MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm
jwt.expiration=86400000

# ============================================================================
# Swagger/OpenAPI Configuration (Development)
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================================
# Logging Configuration (Development)
# ============================================================================
logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
