# Development Environment Configuration with OPTIONAL SSL

# ============================================================================
# Server Configuration (Development)
# ============================================================================
server.port=${SERVER_PORT:8080}

# Optional SSL/TLS Configuration (uncomment to enable for development)
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# server.ssl.enabled=true

# ============================================================================
# Database Configuration (Development - defaults to H2 for out-of-box experience)
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ticketdb-dev;DB_CLOSE_DELAY=-1;MODE=MYSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# To use MySQL, set environment variables:
# SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/ticket_rising_system_dev?useSSL=false&serverTimezone=UTC
# SPRING_DATASOURCE_USERNAME=root
# SPRING_DATASOURCE_PASSWORD=your_password
# SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA Configuration (Development)
# ============================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT Configuration (Development)
# ============================================================================
jwt.secret=MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm
jwt.expiration=86400000

# ============================================================================
# Swagger/OpenAPI Configuration (Development)
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================================
# Logging Configuration (Development)
# ============================================================================
logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
