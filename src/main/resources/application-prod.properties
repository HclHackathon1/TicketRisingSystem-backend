# Production Environment Configuration with SSL

# ============================================================================
# Server Configuration (Production)
# ============================================================================
server.port=8443
server.servlet.context-path=/api

# SSL/TLS Configuration (Production - ENABLED)
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.ssl.enabled=true
server.ssl.protocol=TLSv1.2
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# HTTP/2 Support
server.http2.enabled=true

# Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.algorithms=gzip,deflate

# ============================================================================
# Database Configuration (Production)
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticket_rising_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA Configuration (Production)
# ============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================================
# JWT Configuration (Production)
# ============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================================
# Swagger/OpenAPI Configuration (Production - disable in production)
# ============================================================================
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# ============================================================================
# Logging Configuration (Production)
# ============================================================================
logging.level.root=WARN
logging.level.com.example.ticketrisingsystem=INFO
logging.level.org.springframework.security=INFO
