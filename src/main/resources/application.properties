spring.application.name=TicketRisingSystem

# ============================================================================
# Server Configuration
# ============================================================================
server.port=8080
server.servlet.context-path=/


jwt.secret=${JWT_SECRET:MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operations-sorter=method

# ============================================================================
# JPA Configuration
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true


# Default datasource is MySQL. Database is auto-created if missing.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticket_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Rithikka123}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
