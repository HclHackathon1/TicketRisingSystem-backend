spring.application.name=TicketRisingSystem

# Make server port configurable for clones (avoids 'Port 8080 already in use').
# Override with environment variable: SERVER_PORT=8081 (or any free port)
server.port=${SERVER_PORT:8080}

# ============================================================================
# Server Configuration
# ============================================================================
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}


jwt.secret=${JWT_SECRET:MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operations-sorter=method

# ============================================================================
# JPA Configuration
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Djaadhi_09}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
