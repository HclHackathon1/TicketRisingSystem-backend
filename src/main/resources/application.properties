spring.application.name=TicketRisingSystem

# ============================================================================
# Server Configuration
# ============================================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/


jwt.secret=${JWT_SECRET:MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.operations-sorter=method

# ============================================================================
# JPA Configuration
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ticketdb;DB_CLOSE_DELAY=-1;MODE=MYSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# If you want to use MySQL, set these env vars (example):
# SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC
# SPRING_DATASOURCE_USERNAME=root
# SPRING_DATASOURCE_PASSWORD=your_password

logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
