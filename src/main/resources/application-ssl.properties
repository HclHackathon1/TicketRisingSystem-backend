# SSL/TLS Environment Configuration

# ============================================================================
# Server Configuration
# ============================================================================
server.port=8443
server.servlet.context-path=/

# ============================================================================
# SSL/TLS Configuration 
# ============================================================================
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.ssl.enabled=true
server.ssl.protocol=TLSv1.2
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# HTTP/2 Support
server.http2.enabled=true

# Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.algorithms=gzip,deflate

# ============================================================================
# Database Configuration
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_rising_system_dev
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA Configuration
# ============================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT Configuration
# ============================================================================
jwt.secret=MyVerySecureJWTSecretKeyWithMinimum32CharactersForHS512Algorithm
jwt.expiration=86400000

# ============================================================================
# Swagger/OpenAPI Configuration
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.example.ticketrisingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
