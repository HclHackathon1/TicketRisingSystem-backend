version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ticket_rising_db
    environment:
      MYSQL_ROOT_PASSWORD: Djaadhi_09
      MYSQL_DATABASE: ticket_system
      MYSQL_USER: root
      MYSQL_PASSWORD: Djaadhi_09
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Application
  app:
    build: .
    container_name: ticket_rising_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ticket_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Djaadhi_09
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  ticket-network:
    driver: bridge
